*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F2F4F7;color:#1C2B3A;min-height:100vh}
.hdr{background:#0F2340;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}

.hdr-sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:1px}
.hdr-badge{background:rgba(11,158,138,.2);border:1px solid rgba(11,158,138,.4);color:#13C4AD;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.wrap{max-width:980px;margin:0 auto;padding:28px 18px 60px}
.panel{background:#fff;border-radius:12px;border:1px solid #DDE2EA;box-shadow:0 2px 12px rgba(15,35,64,.06);overflow:hidden;margin-bottom:16px}
.ph{background:#0F2340;padding:12px 20px;display:flex;align-items:center;gap:9px}
.ph svg{width:15px;height:15px;stroke:#13C4AD;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ph span{color:#fff;font-size:13px;font-weight:600}
.pb{padding:18px 20px;padding-bottom:280px}
.g4{display:grid;grid-template-columns:2fr 1.1fr 1.3fr auto;gap:14px;align-items:end}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10.5px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em}
.field input,.field select{font-family:inherit;font-size:13.5px;color:#1C2B3A;background:#F2F4F7;border:1.5px solid #DDE2EA;border-radius:8px;padding:9px 12px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus{border-color:#0B9E8A;background:#fff;box-shadow:0 0 0 3px rgba(11,158,138,.1)}

.field select:disabled{opacity:.4;cursor:not-allowed}
.ac-wrap{position:relative}
.ac-dd{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#ffffff !important;border:1.5px solid #0B9E8A;border-radius:8px;max-height:240px;overflow-y:auto;z-index:9999;display:none;box-shadow:0 8px 24px rgba(15,35,64,.18)}

.ac-item{padding:9px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;gap:8px;color:#1C2B3A !important;background:#ffffff !important}
.ac-item span{color:#1C2B3A !important;font-size:13px}
.ac-item:hover{background:#F0FDF9 !important;color:#0B9E8A !important}
.ac-item:hover span{color:#0B9E8A !important}
.ac-item:last-child{border-bottom:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#059669}
.dot-no{background:#DC2626}
.btn-ok{font-family:inherit;font-size:13.5px;font-weight:600;color:#fff;background:#0B9E8A;border:none;border-radius:8px;padding:10px 22px;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-ok:hover{background:#0A8A78}
.btn-ok:disabled{opacity:.4;cursor:not-allowed;background:#0B9E8A}
#result{display:none}
.banner{border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px;border:2px solid}
.b-ok{background:#ECFDF5;border-color:#6EE7B7}
.b-warn{background:#FFFBEB;border-color:#FCD34D}
.b-err{background:#FEF2F2;border-color:#FCA5A5}
.bi{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.b-ok .bi{background:#059669}.b-warn .bi{background:#D97706}.b-err .bi{background:#DC2626}
.bi svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.bt{font-size:14px;font-weight:700}
.b-ok .bt{color:#065F46}.b-warn .bt{color:#92400E}.b-err .bt{color:#991B1B}
.bs{font-size:12.5px;margin-top:3px}
.b-ok .bs{color:#047857}.b-warn .bs{color:#B45309}.b-err .bs{color:#B91C1C}
.ai-box{background:#EFF6FF;border-left:4px solid #3B82F6;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:14px;font-size:13px;line-height:1.7;color:#1e3a5f}
.ai-lbl{font-size:10px;font-weight:700;color:#1E40AF;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border-radius:10px;border:1px solid #DDE2EA;overflow:hidden}
.card.full{grid-column:1/-1}
.ch{background:#F8FAFC;padding:10px 14px;border-bottom:1px solid #DDE2EA;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:7px}
.ch svg{width:13px;height:13px;stroke:#0B9E8A;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cb{padding:12px 14px;font-size:13px;line-height:1.65;color:#1C2B3A}
.cb p{margin-bottom:4px}.cb p:last-child{margin-bottom:0}
.chip{background:#E0F2FE;color:#0369A1;font-size:11.5px;padding:2px 9px;border-radius:20px;display:inline-block;margin:2px}
.ss{background:#ECFDF5;border:1px solid #6EE7B7;color:#065F46;font-size:11.5px;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;margin:2px}
.sn{background:#F8FAFC;border:1px solid #E2E8F0;color:#94A3B8;font-size:11.5px;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;margin:2px}
.s-hl{outline:2px solid #0B9E8A;outline-offset:2px}
a.lnk{color:#0B9E8A;text-decoration:underline;font-size:12.5px;word-break:break-all}
footer{text-align:center;font-size:11px;color:#94A3B8;padding:20px}
@media(max-width:700px){.g4{grid-template-columns:1fr 1fr}.cards2{grid-template-columns:1fr}}

</style>

// ── Carga dinámica desde Google Sheets ──────────────────────
function getCell(row, idx) {
  return (row[idx] && row[idx].v != null) ? String(row[idx].v).trim() : '';
}
function parseSheetRow(row) {
  var fin = getCell(row, 2);
  if (!fin) return null;
  var planes = getCell(row, 4);
  if (planes.indexOf('\n') >= 0) {
    planes = planes.split('\n').map(function(p){return p.trim();}).filter(Boolean).join(' -- ');
  }
  var entry = [getCell(row,1),fin,getCell(row,3),planes,getCell(row,5),getCell(row,6),getCell(row,7),getCell(row,8),getCell(row,9),getCell(row,10)];
  for (var s=11;s<=31;s++) entry.push((row[s]&&row[s].v)?'1':'0');
  // Cols nuevas: AG=32 NORMA OPERATIVA, AH=33 FOTO CREDENCIAL, AI=34 ACT.
  entry.push(getCell(row,32)); // [31] NORMA OPERATIVA
  entry.push(getCell(row,33)); // [32] FOTO CREDENCIAL
  entry.push(getCell(row,34)); // [33] ACT.
  return entry;
}
function loadFromSheets() {
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json';
  var el=document.getElementById('data-status');
  fetch(url).then(function(r){return r.text();}).then(function(raw){
    var s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s<0||e<0) throw new Error('Respuesta invalida');
    var data=JSON.parse(raw.substring(s,e+1));
    var rows=data.table.rows;
    if(!rows||rows.length<2) throw new Error('Sin filas');
    var newD=[];
    for(var i=1;i<rows.length;i++){
      if(!rows[i]||!rows[i].c) continue;
      var p=parseSheetRow(rows[i].c);
      if(p) newD.push(p);
    }
    if(newD.length<10) throw new Error('Pocos registros: '+newD.length);
    D=newD;
    var now=new Date();
    var ts=now.toLocaleDateString('es-AR')+' '+now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    el.textContent='Datos actualizados '+ts+' · '+newD.length+' obras sociales';
    el.style.color='#0B9E8A';
  }).catch(function(err){
    console.warn('Sheets:',err.message,'usando datos locales');
    var fechaArchivo = new Date(document.lastModified).toLocaleDateString('es-AR');
    el.textContent='\u26a0\ufe0f SIN CONEXI\u00d3N \u2014 Mostrando informaci\u00f3n del ' + fechaArchivo;
    el.style.color='#DC2626';
    el.style.fontWeight='600';
  });
}
document.addEventListener('DOMContentLoaded', function(){loadFromSheets();});

var sel=null,blurT=null;
var osIn=document.getElementById('os-in');
var acDd=document.getElementById('ac-dd');
osIn.addEventListener('input',renderAC);
osIn.addEventListener('focus',renderAC);
osIn.addEventListener('blur',function(){blurT=setTimeout(closeAC,200);});
function renderAC(){
  var q=osIn.value.toLowerCase().trim();
  if(q.length<1){closeAC();clearForm();return;}
  var hits=D.filter(function(r){return r[1].toLowerCase().indexOf(q)>=0||(r[3]&&r[3].toLowerCase().indexOf(q)>=0);}).slice(0,14);
  if(!hits.length){
    acDd.innerHTML='<div class="ac-item" style="color:#94A3B8">Sin resultados</div>';
  } else {
    acDd.innerHTML=hits.map(function(r){
      var ok=r[0].toUpperCase().indexOf('ACTIVO')>=0;
      return '<div class="ac-item" onclick="pick('+D.indexOf(r)+')"><div class="dot '+(ok?'dot-ok':'dot-no')+'"></div><span>'+esc(r[1])+'</span></div>';
    }).join('');
  }
  acDd.classList.add('open');
}
function closeAC(){acDd.classList.remove('open');}
function pick(i){
  clearTimeout(blurT);
  sel=D[i];
  osIn.value=sel[1];
  closeAC();
  fillPlans();
  fillSedes();
  document.getElementById('btn-ok').disabled=false;
}
function fillPlans(){
  var s=document.getElementById('plan-sel');
  s.disabled=false;
  var raw=(sel[3]||'').trim();
  if(!raw){s.innerHTML='<option value="PLAN UNICO">Plan Unico</option>';return;}
  var parts=raw.split(/\s*\/\s*|\s*--\s*|\n/).map(function(p){return p.trim();}).filter(function(p){return p.length>1;});
  var seen={};parts=parts.filter(function(p){return seen[p]?false:(seen[p]=true);});
  s.innerHTML=(parts.length>1?'<option value="">Selecciona plan</option>':'')+parts.map(function(p){
    return '<option value="'+esc(p)+'">'+esc(p)+'</option>';
  }).join('');
  if(parts.length===1)s.value=parts[0];
}
function fillSedes(){
  var s=document.getElementById('sede-sel');
  s.disabled=false;
  s.innerHTML='<option value="">Selecciona sede</option>'+SEDES.map(function(n,i){
    var ok=sel[10+i]==='1';
    return '<option value="'+n+'" '+(ok?'':'style="color:#94A3B8"')+'>'+(ok?'\u2713':'\u2717')+' '+n+'</option>';
  }).join('');
}
function clearForm(){
  sel=null;
  ['plan-sel','sede-sel'].forEach(function(id){
    var s=document.getElementById(id);
    s.innerHTML='<option value="">Elegi la OS</option>';
    s.disabled=true;
  });
  document.getElementById('btn-ok').disabled=true;
  document.getElementById('result').style.display='none';
}
function buscar(){
  if(!sel)return;
  var r=sel;
  var activo=r[0].toUpperCase().indexOf('ACTIVO')>=0;
  var plan=document.getElementById('plan-sel').value;
  var sede=document.getElementById('sede-sel').value;
  var si=SEDES.indexOf(sede);
  var sedeOk=si>=0&&r[10+si]==='1';
  var cls=!activo?'b-err':(!sede||sedeOk)?'b-ok':'b-warn';
  var icons={
    'b-ok':'<polyline points="20 6 9 17 4 12"/>',
    'b-warn':'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
    'b-err':'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
  };
  var actFechaRaw=(r[33]||'').trim();
  var actFecha='';
  if(actFechaRaw){
    var dm=actFechaRaw.match(/Date\((\d+),(\d+),(\d+)\)/);
    if(dm){
      actFecha=String(parseInt(dm[3])).padStart(2,'0')+'/'+String(parseInt(dm[2])+1).padStart(2,'0')+'/'+dm[1];
    } else {
      actFecha=actFechaRaw;
    }
  }
  var actLabel=actFecha?' \u2014 \u00faltima actualizaci\u00f3n '+actFecha:'';
  var bT=!activo?'Contrato SUSPENDIDO \u2014 no otorgar turnos':
    !sede?'Contrato ACTIVO'+actLabel:
    sedeOk?'Contrato ACTIVO \u2014 '+esc(sede)+' incluida'+actLabel:
    esc(sede)+' NO est\u00e1 en el contrato vigente'+actLabel;
  var bS=!activo?'El acuerdo con '+esc(r[1])+' est\u00e1 suspendido.':
    !sede?esc(r[1])+' tiene contrato vigente.':
    sedeOk?'El paciente puede ser atendido en '+esc(sede)+'.':
    'Esta sede no figura en el acuerdo. Verificar con el \u00e1rea comercial.';
  var pp=[];
  if(r[3]){
    var seen={};
    r[3].split(/\s*\/\s*|\s*--\s*|\n/).forEach(function(x){x=x.trim();if(x.length>1&&!seen[x]){seen[x]=true;pp.push(x);}});
  }
  var plH=pp.length?pp.map(function(x){return '<span class="chip">'+esc(x)+'</span>';}).join(''):'<span style="color:#94A3B8">Sin planes especificados</span>';
  var seH=SEDES.map(function(n,i){
    var ok=r[10+i]==='1',hl=(n===sede)?' s-hl':'';
    return '<span class="'+(ok?'ss':'sn')+hl+'">'+(ok?'\u2713':'\u2717')+' '+n+'</span>';
  }).join('');
  var vR=(r[9]||'').trim();
  var vH=vR&&vR.indexOf('http')===0?'<a class="lnk" href="'+vR+'" target="_blank">\u2192 Abrir validador</a>':
    vR&&vR!=='NO'&&vR!=='SI'?esc(vR):'<span style="color:#94A3B8">Sin validador especificado</span>';
  var dH='';
  if((r[5]||'').trim()){
    r[5].split(/\n/).forEach(function(x){x=x.trim();if(x)dH+='<p>\u2022 '+esc(x)+'</p>';});
    if(!dH)dH='<p>\u2022 '+esc(r[5])+'</p>';
  } else {
    dH='<p style="color:#94A3B8">Sin documentaci\u00f3n especificada</p>';
  }
  var ai=buildAI(activo,sedeOk,sede,plan,r[2],r[8],r[6],r[7],r[9],r[1]);
  document.getElementById('result').innerHTML=
    '<div class="banner '+cls+'">'
    +'<div class="bi"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">'+icons[cls]+'</svg></div>'
    +'<div><div class="bt">'+bT+'</div><div class="bs">'+bS+'</div></div></div>'
    +'<div class="ai-box"><div class="ai-lbl">An\u00e1lisis para el admisionista</div>'+ai+'</div>'
    +'<div class="cards2">'
    +'<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Informaci\u00f3n del financiador</div><div class="cb"><p><strong>'+esc(r[1])+'</strong></p>'+(r[2]?'<p style="color:#64748B;font-size:12px;margin-top:6px">'+esc(r[2])+'</p>':'<p style="color:#CBD5E1">Sin observaciones adicionales</p>')+'</div></div>'
    +'<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Documentaci\u00f3n a presentar</div><div class="cb">'+dH+'</div></div>'
    +'<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Figura en SC</div><div class="cb">'+(r[4]&&r[4].trim()?'<p>'+esc(r[4])+'</p>':'<p style="color:#94A3B8">Sin informaci\u00f3n en SC</p>')+'</div></div>'
    +'<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Coseguros y cobertura adicional</div><div class="cb"><p><strong>Coseguros:</strong> '+esc(r[8]||'\u2014')+'</p><p><strong>Enfermer\u00eda:</strong> '+esc(r[6]||'\u2014')+'</p><p><strong>APB:</strong> '+esc(r[7]||'\u2014')+'</p></div></div>'
    +'<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Planes disponibles</div><div class="cb">'+(plan?'<div style="background:#ECFDF5;color:#065F46;font-size:12px;padding:6px 10px;border-radius:8px;margin-bottom:8px">Plan seleccionado: <strong>'+esc(plan)+'</strong></div>':'')+'<div>'+plH+'</div></div></div>'
    +'<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Validador de afiliados</div><div class="cb">'+vH+'</div></div>'
    +'<div class="card full"><div class="ch"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Sedes incluidas en el contrato</div><div class="cb"><div style="display:flex;flex-wrap:wrap">'+seH+'</div></div></div>'
    +(r[31]&&r[31].trim()?'<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Norma operativa</div><div class="cb"><a class="lnk" href="'+esc(r[31])+'" target="_blank">\u2192 Ver norma operativa</a></div></div>':'')    +(r[32]&&r[32].trim()?'<div class="card full"><div class="ch"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Credenciales</div><div class="cb"><div style="display:flex;flex-wrap:wrap;gap:10px">'+r[32].split(',').map(function(url){url=url.trim();return url?'<img src="'+esc(url)+'" alt="Credencial" style="max-height:200px;border-radius:8px;border:1px solid #E2E8F0;cursor:pointer" onclick="window.open(this.src,\'_blank\')" onerror="this.style.display=&quot;none&quot;">':'';}).join('')+'</div></div></div>':'')    +'</div>';
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}
function buildAI(activo,sedeOk,sede,plan,obs,coseg,enfer,apb,valid,os){
  if(!activo)return'<strong>Contrato suspendido:</strong> no otorgar turno ni admitir pacientes de <strong>'+esc(os)+'</strong>. Derivar a auditor\u00eda o gerencia comercial.';
  var p=[];
  p.push('El contrato con <strong>'+esc(os)+'</strong> est\u00e1 <strong>vigente y activo</strong>.');
  if(sede){
    if(sedeOk)p.push('La sede <strong>'+esc(sede)+'</strong> est\u00e1 incluida en el acuerdo \u2014 pod\u00e9s proceder con la admisi\u00f3n.');
    else p.push('<strong>Atenci\u00f3n:</strong> la sede <strong>'+esc(sede)+'</strong> NO figura en el contrato. No asignar turno sin verificar con el \u00e1rea comercial.');
  }
  if(plan)p.push('Plan consultado: <strong>'+esc(plan)+'</strong>.');
  if(coseg){
    var c=coseg.toUpperCase();
    if(c==='OS'||c.indexOf('OBRA SOCIAL')>=0)p.push('Coseguros a cargo de la obra social \u2014 el paciente no abona en ventanilla.');
    else if(c==='NO TIENE'||c==='NO')p.push('Sin coseguros.');
    else if(c.indexOf('AFILIADO')>=0||c.indexOf('AFILIADX')>=0)p.push('Coseguros a cargo del afiliado \u2014 cobrar en admisi\u00f3n seg\u00fan cuadro vigente.');
    else if(c.indexOf('DEPENDE')>=0)p.push('Coseguros dependen del plan \u2014 verificar cuadro antes de admitir.');
    else if(c.indexOf('BONO')>=0)p.push('Requiere bono de consulta \u2014 el afiliado debe presentarlo.');
    else p.push('Coseguros: <strong>'+esc(coseg)+'</strong>.');
  }
  if(obs){
    var o=obs.toLowerCase();
    if(o.indexOf('autorizaci')>=0&&(o.indexOf('previa')>=0||o.indexOf('requieren')>=0))
      p.push('<strong>Requiere autorizaci\u00f3n previa</strong> para pr\u00e1cticas \u2014 verificar seg\u00fan el tipo de consulta.');
    var tel=obs.match(/0[89]\d{2}[-\s]?\d{3}[-\s]?\d{4}/);
    if(tel)p.push('Contacto de mesa operativa: <strong>'+tel[0]+'</strong>.');
    if(o.indexOf('baja')>=0)p.push('<strong>Hay \u00edtems o planes dados de baja</strong> \u2014 leer observaciones en detalle.');
  }
  if(valid&&valid!=='NO'&&(valid.indexOf('http')===0||valid.indexOf('.')>=0))
    p.push('Record\u00e1 <strong>validar la afiliaci\u00f3n</strong> en el sistema antes de confirmar el turno.');
  return p.join(' ');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
